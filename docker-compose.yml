services:
  rsa-gui:
    build: .
    image: rsa-encryption-gui:latest
    container_name: rsa-encryption-gui
    environment:
      # macOS (XQuartz): set DISPLAY=host.docker.internal:0 before running
      # Linux: DISPLAY=:0 and /tmp/.X11-unix mount below both work
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-xcb}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    network_mode: host
    restart: unless-stopped
